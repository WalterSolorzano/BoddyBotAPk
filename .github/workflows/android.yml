name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.11

    - name: Create dummy .env, local.properties and google-services.json
      run: |
        if [ ! -f .env ]; then
          cp .env.example .env || touch .env
        fi
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        if [ ! -f app/google-services.json ]; then
          echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.aistudio.unibuddy.qywvsp"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
        fi

    - name: Decode debug keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, creating a dummy one for build"
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        ls -l debug.keystore

    - name: Download intact Spotify AAR
      run: |
        curl -sL https://github.com/spotify/android-app-remote-sdk/archive/master.zip -o spotify.zip
        unzip -q spotify.zip
        cp android-sdk-master/app-remote-lib/spotify-app-remote-*.aar app/libs/spotify-app-remote.aar
        rm -rf spotify.zip android-sdk-master
        
    - name: Build with Gradle
      run: gradle assembleDebug --stacktrace

    - name: Job Summary
      if: always()
      run: |
        echo "### 🚀 Resumen de Compilación (Android CI)" >> $GITHUB_STEP_SUMMARY
        echo "- **Estado**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ **¡Construcción exitosa!** El APK ha sido generado correctamente y está disponible en los artefactos." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **La construcción falló.**" >> $GITHUB_STEP_SUMMARY
          echo "> *💡 Nota: Si el error en los logs menciona 'Our services aren't available right now', 'Cache service responded with 400' o 'exit code 9' antes de iniciar Gradle, significa que **los servidores de GitHub Actions se cayeron temporalmente**. No es un error en el código de la app, simplemente vuelve a ejecutar (Re-run all jobs).* " >> $GITHUB_STEP_SUMMARY
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
