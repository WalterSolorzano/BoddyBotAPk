workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install Correct Gradle Version
        script: |
          wget https://gradle.org -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-9.3.1-bin.zip
          export PATH=/opt/gradle/gradle-9.3.1/bin:$PATH
          echo "export PATH=/opt/gradle/gradle-9.3.1/bin:\$PATH" >> $CM_ENV
      - name: Build Android APK
        script: | 
          gradle assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
